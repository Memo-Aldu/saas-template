[project]
name = "aws_utils"
version = "0.1.0"
description = "AWS utility functions"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.73",
    "pydantic>=2.12.5",
    "shared_core",
]

[tool.uv.sources]
shared_core = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "ruff>=0.15.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aws_utils"]
